name: AIUNION Marketing Agent

# Cron is UTC. We deliberately do NOT adjust for DST — schedule is fixed to EST (UTC-5).
# 5 daily slots:
#   12:00 UTC = 7am EST  -> announce
#   15:00 UTC = 10am EST -> reply
#   18:00 UTC = 1pm EST  -> reply
#   22:00 UTC = 5pm EST  -> announce
#   01:00 UTC = 8pm EST  -> reply (fires next calendar day in UTC)
on:
  schedule:
      - cron: "0 12 * * *"
          - cron: "0 15 * * *"
              - cron: "0 18 * * *"
                  - cron: "0 22 * * *"
                      - cron: "0 1 * * *"
                        workflow_dispatch:
                            inputs:
                                  mode:
                                          description: "Run mode (announce or reply)"
                                                  required: true
                                                          default: "announce"
                                                                  type: choice
                                                                          options:
                                                                                    - announce
                                                                                              - reply

                                                                                              jobs:
                                                                                                post:
                                                                                                    name: Generate and Post
                                                                                                        runs-on: ubuntu-latest
                                                                                                            timeout-minutes: 5
                                                                                                                permissions:
                                                                                                                      contents: write
                                                                                                                          steps:
                                                                                                                                - name: Checkout repo
                                                                                                                                        uses: actions/checkout@v4
                                                                                                                                                with:
                                                                                                                                                          fetch-depth: 1
                                                                                                                                                          
                                                                                                                                                                - name: Set up Python
                                                                                                                                                                        uses: actions/setup-python@v5
                                                                                                                                                                                with:
                                                                                                                                                                                          python-version: "3.12"
                                                                                                                                                                                          
                                                                                                                                                                                                - name: Install dependencies
                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                  python -m pip install --upgrade pip
                                                                                                                                                                                                                            pip install openai
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                  - name: Determine run mode
                                                                                                                                                                                                                                          id: mode
                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                            # Map cron schedule -> mode. workflow_dispatch passes mode directly.
                                                                                                                                                                                                                                                                      if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                                                                                                                                                                                                                                                                                  MODE="${{ github.event.inputs.mode }}"
                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                        case "${{ github.event.schedule }}" in
                                                                                                                                                                                                                                                                                                                      "0 12 * * *") MODE="announce" ;;
                                                                                                                                                                                                                                                                                                                                    "0 22 * * *") MODE="announce" ;;
                                                                                                                                                                                                                                                                                                                                                  "0 15 * * *") MODE="reply" ;;
                                                                                                                                                                                                                                                                                                                                                                "0 18 * * *") MODE="reply" ;;
                                                                                                                                                                                                                                                                                                                                                                              "0 1 * * *")  MODE="reply" ;;
                                                                                                                                                                                                                                                                                                                                                                                            *)            MODE="reply" ;;
                                                                                                                                                                                                                                                                                                                                                                                                        esac
                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "Run mode: $MODE"
                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Restore state from Git
                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ -f state.json ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "State file found in repo"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo '{"announced_bounty_ids":[],"announced_paid_ids":[],"replied_tweet_ids":[],"replied_user_ids_24h":{},"last_mention_id":""}' > state.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Initialized fresh state"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Syntax check
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              python -m py_compile agent.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        python -m py_compile grok_client.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  python -m py_compile twitter_client.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            python -m py_compile aiunion_client.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "All syntax checks passed"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Secret scan (gitleaks)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    uses: gitleaks/gitleaks-action@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Run marketing agent
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              AIUNION_OPENROUTER_API_KEY: ${{ secrets.AIUNION_OPENROUTER_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: python agent.py --mode ${{ steps.mode.outputs.mode }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Commit state back to repo
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config user.email "agent@aiunion.wtf"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git config user.name "AIUNION Marketing Agent"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git add state.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if git diff --cached --quiet; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "No state changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git commit -m "chore(state): update agent state after ${{ steps.mode.outputs.mode }} run"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
