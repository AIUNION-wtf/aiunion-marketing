name: AIUNION Marketing Agent

# Cron is UTC. Fixed to EST (UTC-5), no DST adjustment.
# 12:00 UTC = 7am EST  -> announce
# 15:00 UTC = 10am EST -> reply
# 18:00 UTC = 1pm EST  -> reply
# 22:00 UTC = 5pm EST  -> announce
# 01:00 UTC = 8pm EST  -> reply
on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (announce or reply)"
        required: true
        default: "announce"
        type: choice
        options:
          - announce
          - reply

jobs:
  post:
    name: Generate and Post
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            case "${{ github.event.schedule }}" in
              "0 12 * * *"|"0 22 * * *") MODE="announce" ;;
              *) MODE="reply" ;;
            esac
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Restore state
        run: |
          if [ ! -f state.json ]; then
            echo '{"announced_bounty_ids":[],"announced_paid_ids":[],"replied_tweet_ids":[],"replied_user_ids_24h":{},"last_mention_id":""}' > state.json
          fi

      - name: Syntax check
        run: |
          python -m py_compile agent.py grok_client.py twitter_client.py aiunion_client.py

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run marketing agent
        env:
          AIUNION_OPENROUTER_API_KEY: ${{ secrets.AIUNION_OPENROUTER_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python agent.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit state
        if: always()
        run: |
          git config user.email "agent@aiunion.wtf"
          git config user.name "AIUNION Marketing Agent"
          git add state.json
          git diff --cached --quiet || git commit -m "chore(state): update after ${{ steps.mode.outputs.mode }} run"
          git diff --cached --quiet || git push
