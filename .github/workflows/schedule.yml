name: AIUNION Marketing Agent

on:
  schedule:
    - cron: "30 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  post:
    name: Generate and Post
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: none

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Restore state from previous run
        uses: actions/cache@v4
        with:
          path: state.json
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-

      - name: Syntax check (pre-run validation)
        run: |
          python -m py_compile agent.py
          python -m py_compile grok_client.py
          python -m py_compile twitter_client.py
          python -m py_compile aiunion_client.py
          echo "All syntax checks passed"

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run marketing agent
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python agent.py

      - name: Upload state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: state.json
          retention-days: 30
          if-no-files-found: ignore
