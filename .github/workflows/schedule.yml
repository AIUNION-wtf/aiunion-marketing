name: AIUNION Marketing Agent

on:
  schedule:
      - cron: "0 12 * * *"
          - cron: "0 22 * * *"
            workflow_dispatch:

            jobs:
              post:
                  name: Generate and Post
                      runs-on: ubuntu-latest
                          timeout-minutes: 5
                              permissions:
                                    contents: write

                                        steps:
                                              - name: Checkout repo
                                                      uses: actions/checkout@v4
                                                              with:
                                                                        fetch-depth: 1

                                                                              - name: Set up Python
                                                                                      uses: actions/setup-python@v5
                                                                                              with:
                                                                                                        python-version: "3.12"
                                                                                                        
                                                                                                              - name: Install dependencies
                                                                                                                      run: |
                                                                                                                                python -m pip install --upgrade pip
                                                                                                                                          pip install openai
                                                                                                                                          
                                                                                                                                                - name: Restore state from Git
                                                                                                                                                        run: |
                                                                                                                                                                  if [ -f state.json ]; then
                                                                                                                                                                              echo "State file found in repo"
                                                                                                                                                                                        else
                                                                                                                                                                                                    echo '{"announced_bounty_ids":[],"announced_paid_ids":[],"replied_tweet_ids":[],"replied_user_ids_24h":{},"last_mention_id":"","replies_today":0,"last_reply_date":"","posts_today":0,"last_post_date":"","posted_bounty_ids":[]}' > state.json
                                                                                                                                                                                                                echo "Initialized fresh state"
                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                          
                                                                                                                                                                                                                                - name: Syntax check
                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                  python -m py_compile agent.py
                                                                                                                                                                                                                                                            python -m py_compile grok_client.py
                                                                                                                                                                                                                                                                      python -m py_compile twitter_client.py
                                                                                                                                                                                                                                                                                python -m py_compile aiunion_client.py
                                                                                                                                                                                                                                                                                          echo "All syntax checks passed"
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                - name: Secret scan (gitleaks)
                                                                                                                                                                                                                                                                                                        uses: gitleaks/gitleaks-action@v2
                                                                                                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                                                                                                          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                - name: Run marketing agent
                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                  AIUNION_OPENROUTER_API_KEY: ${{ secrets.AIUNION_OPENROUTER_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                            TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                                      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
                                                                                                                                                                                                                                                                                                                                                                                TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
                                                                                                                                                                                                                                                                                                                                                                                                  run: python agent.py
                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                        - name: Commit state back to repo
                                                                                                                                                                                                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.email "agent@aiunion.wtf"
                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.name "AIUNION Marketing Agent"
                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add state.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                if git diff --cached --quiet; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "No state changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git commit -m "chore(state): update agent state after run"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
