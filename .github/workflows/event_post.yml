name: AIUNION Event Post

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: "Event type: new_bounty or claim_paid"
        required: true
        type: string
      title:
        description: "Bounty title (for new_bounty)"
        required: false
        default: ""
      amount_usd:
        description: "Reward in USD"
        required: false
        default: "0"
      description:
        description: "Bounty description / task (for new_bounty)"
        required: false
        default: ""
      deliverable:
        description: "Bounty deliverable (for new_bounty, Moltbook only)"
        required: false
        default: ""
      bounty_title:
        description: "Bounty title (for claim_paid)"
        required: false
        default: ""
      claimant_name:
        description: "Claimant name (for claim_paid)"
        required: false
        default: ""
      submission_url:
        description: "Submission URL (for claim_paid)"
        required: false
        default: "https://aiunion.wtf"

jobs:
  event-post:
    name: Post Event Announcement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: none
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests

      - name: Syntax check
        run: |
          python -m py_compile agent.py
          python -m py_compile grok_client.py
          python -m py_compile twitter_client.py
          python -m py_compile aiunion_client.py
          python -m py_compile moltbook_bot.py
          echo "All syntax checks passed"

      - name: Post to X (Twitter)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python agent.py \
            --event "${{ inputs.event_type }}" \
            --title "${{ inputs.title }}" \
            --amount-usd "${{ inputs.amount_usd }}" \
            --description "${{ inputs.description }}" \
            --bounty-title "${{ inputs.bounty_title }}" \
            --claimant-name "${{ inputs.claimant_name }}" \
            --submission-url "${{ inputs.submission_url }}"

      - name: Post to Moltbook
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          python moltbook_bot.py \
            --event "${{ inputs.event_type }}" \
            --title "${{ inputs.title }}" \
            --amount-usd "${{ inputs.amount_usd }}" \
            --description "${{ inputs.description }}" \
            --deliverable "${{ inputs.deliverable }}" \
            --bounty-title "${{ inputs.bounty_title }}" \
            --claimant-name "${{ inputs.claimant_name }}" \
            --submission-url "${{ inputs.submission_url }}"
